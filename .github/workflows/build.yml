name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 0.1.0)'
        required: true
        default: '0.1.0'
      channel:
        description: 'Update channel'
        required: true
        default: 'stable'
      download_url:
        description: 'Download URL (leave blank for placeholder)'
        required: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Cache sidecars
        id: cache-sidecars
        uses: actions/cache@v4
        with:
          path: |
            tools\aria2c\x64\aria2c.exe
            tools\yt-dlp\yt-dlp.exe
            tools\ffmpeg\x64\ffmpeg.exe
          key: sidecars-${{ runner.os }}-v3

      - name: Download aria2c
        if: steps.cache-sidecars.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tools\aria2c\x64 | Out-Null
          $zip = "$env:TEMP\aria2.zip"
          curl.exe -L -o $zip "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip"
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\aria2" -Force
          Copy-Item "$env:TEMP\aria2\aria2-1.37.0-win-64bit-build1\aria2c.exe" tools\aria2c\x64\aria2c.exe -Force

      - name: Download yt-dlp
        if: steps.cache-sidecars.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tools\yt-dlp | Out-Null
          curl.exe -L -o tools\yt-dlp\yt-dlp.exe "https://github.com/yt-dlp/yt-dlp/releases/download/2026.03.17/yt-dlp.exe"

      - name: Download ffmpeg
        if: steps.cache-sidecars.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tools\ffmpeg\x64 | Out-Null
          $zip = "$env:TEMP\ffmpeg.zip"
          curl.exe -L -C - -o $zip "https://github.com/GyanD/codexffmpeg/releases/download/2025-01-15-git-4f3c9f2f03/ffmpeg-2025-01-15-git-4f3c9f2f03-essentials_build.zip"
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\ffmpeg" -Force
          Copy-Item "$env:TEMP\ffmpeg\ffmpeg-*-essentials_build\bin\ffmpeg.exe" tools\ffmpeg\x64\ffmpeg.exe -Force

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $installer = "$env:TEMP\innosetup.exe"
          curl.exe -L -o $installer "https://jrsoftware.org/download.php/is.exe"
          Start-Process -FilePath $installer -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=`"$env:ProgramFiles\Inno Setup 6`"" -Wait
          "$env:ProgramFiles\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Build
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version || '0.1.0' }}"
          $channel = "${{ github.event.inputs.channel || 'stable' }}"
          $url = "${{ github.event.inputs.download_url || '' }}"
          $buildArgs = @{ Version = $version; Channel = $channel }
          if ($url) { $buildArgs.DownloadUrl = $url }
          .\build.ps1 @buildArgs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: o-down-${{ github.event.inputs.version || 'latest' }}
          path: |
            dist\o-down-*.zip
            dist\o-down-*-setup.exe
            dist\latest.json
          compression-level: 0
